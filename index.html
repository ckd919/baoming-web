<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>康康个人工具 - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:#F5F6F8;color:#333}
.header{background:linear-gradient(135deg,#FF6B35,#FF8C5A);color:#fff;padding:24px 32px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:22px}
.header .user{font-size:13px;opacity:.85}
.logout-btn{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 16px;border-radius:16px;font-size:13px;cursor:pointer}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;padding:24px 32px}
.card{background:#fff;padding:24px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.card .val{font-size:36px;font-weight:700;color:#FF6B35}
.card .lbl{font-size:13px;color:#999;margin-top:4px}
.tabs{display:flex;gap:0;padding:0 32px;border-bottom:2px solid #eee}
.tab{padding:12px 24px;font-size:14px;cursor:pointer;color:#999;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.tab.active{color:#FF6B35;border-bottom-color:#FF6B35;font-weight:600}
.content{padding:24px 32px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
th{background:#FAFAFA;padding:14px 16px;text-align:left;font-size:13px;color:#666;font-weight:600;border-bottom:1px solid #eee}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f5f5f5}
.status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px}
.status.published{background:#E8F8ED;color:#34C759}
.status.draft{background:#F0F0F2;color:#8E8E93}
.status.ended{background:#FFF2E8;color:#FF6B35}
.login-box{max-width:360px;margin:100px auto;background:#fff;padding:40px;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-box h2{margin-bottom:24px;color:#FF6B35}
.login-box input{width:100%;height:48px;margin-bottom:16px;padding:0 16px;font-size:15px;border:2px solid #eee;border-radius:12px;outline:none}
.login-box input:focus{border-color:#FF6B35}
.login-box button{width:100%;height:48px;background:linear-gradient(135deg,#FF6B35,#FF8C5A);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.error{color:#D32F2F;font-size:13px;margin-bottom:12px}
.pagination{display:flex;justify-content:center;gap:8px;padding:20px}
.pagination button{padding:8px 16px;border:1px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;font-size:13px}
.pagination button.active{background:#FF6B35;color:#fff;border-color:#FF6B35}
.pagination button:disabled{opacity:.3;cursor:default}
</style>
</head>
<body>
<div id="login" style="display:none">
<div class="login-box">
<h2>🔐 管理后台登录</h2>
<div class="error" id="loginError"></div>
<input id="phone" type="text" placeholder="手机号" maxlength="11">
<input id="password" type="password" placeholder="密码">
<button onclick="doLogin()">登 录</button>
</div>
</div>
<div id="app" style="display:none">
<div class="header">
<h1>📊 管理后台</h1>
<div><span class="user" id="loginPhone"></span> <button class="logout-btn" onclick="logout()">退出</button></div>
</div>
<div class="cards">
<div class="card"><div class="val" id="totalUsers">-</div><div class="lbl">注册用户</div></div>
<div class="card"><div class="val" id="todayNew">-</div><div class="lbl">今日新增</div></div>
<div class="card"><div class="val" id="totalActivities">-</div><div class="lbl">活动总数</div></div>
<div class="card"><div class="val" id="pubActivities">-</div><div class="lbl">已发布活动</div></div>
<div class="card"><div class="val" id="totalSubmissions">-</div><div class="lbl">报名总数</div></div>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab('users')">👥 用户列表</div>
<div class="tab" onclick="switchTab('activities')">📋 活动列表</div>
</div>
<div class="content">
<div id="usersTab">
<table><thead><tr><th>ID</th><th>昵称</th><th>手机号</th><th>OpenID</th><th>角色</th><th>实名</th><th>状态</th><th>操作</th><th>注册时间</th></tr></thead>
<tbody id="usersBody"></tbody></table>
<div id="userPages" class="pagination"></div>
</div>
<div id="activitiesTab" style="display:none">
<table><thead><tr><th>ID</th><th>活动名称</th><th>创建者</th><th>状态</th><th>报名数</th><th>操作</th><th>创建时间</th></tr></thead>
<tbody id="activitiesBody"></tbody></table>
</div>
</div>
</div>
<script>
var API = 'https://ledbell.cn/api';
var token = localStorage.getItem('admin_token');
var phone = localStorage.getItem('admin_phone');
var currentTab = 'users';
var currentPage = 1;

if (token) { showApp(); loadDashboard(); loadUsers(1); }
else { document.getElementById('login').style.display = 'block'; }

function doLogin() {
  var p = document.getElementById('phone').value.trim();
  var pw = document.getElementById('password').value.trim();
  if (!p || !pw) { document.getElementById('loginError').textContent = '请输入手机号和密码'; return; }
  fetch(API + '/auth/admin/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({phone:p, password:pw})
  })
  .then(r => r.json())
  .then(d => {
    if (d.token) {
      token = d.token; phone = p;
      localStorage.setItem('admin_token', token);
      localStorage.setItem('admin_phone', phone);
      showApp(); loadDashboard(); loadUsers(1);
    } else {
      document.getElementById('loginError').textContent = d.error || '登录失败';
    }
  })
  .catch(e => { document.getElementById('loginError').textContent = '网络错误'; });
}

function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('loginPhone').textContent = '📱 ' + phone;
}

function logout() {
  localStorage.removeItem('admin_token');
  localStorage.removeItem('admin_phone');
  location.reload();
}

function api(path, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['Authorization'] = 'Bearer ' + token;
  return fetch(API + path, opts)
    .then(r => { if (r.status === 401) { logout(); throw new Error('未登录'); } return r.json(); });
}

function toggleUser(id) {
  if (!confirm('确定切换该用户的启用状态吗？')) return;
  api('/admin/users/' + id + '/toggle', { method: 'PUT' })
    .then(d => { if (d.ok) loadUsers(currentPage); else alert(d.error); })
    .catch(e => alert(e.message));
}

function deleteActivity(id, name) {
  if (!confirm('确定删除活动「' + name + '」吗？此操作不可恢复！')) return;
  api('/admin/activities/' + id, { method: 'DELETE' })
    .then(d => { if (d.ok) loadActivities(); else alert(d.error); })
    .catch(e => alert(e.message));
}

function loadDashboard() {
  api('/admin/dashboard').then(d => {
    document.getElementById('totalUsers').textContent = d.totalUsers || 0;
    document.getElementById('todayNew').textContent = d.todayNewUsers || 0;
    document.getElementById('totalActivities').textContent = d.totalActivities || 0;
    document.getElementById('pubActivities').textContent = d.publishedActivities || 0;
    document.getElementById('totalSubmissions').textContent = d.totalSubmissions || 0;
  });
}

function loadUsers(page) {
  currentPage = page || 1;
  api('/admin/users?page=' + currentPage + '&pageSize=20').then(d => {
    var html = '';
    (d.users||[]).forEach(u => {
      html += '<tr><td>' + u.id + '</td><td>' + e(u.nickname) + '</td><td>' + e(u.phone) + '</td><td>' + (u.hasOpenid ? '✅' : '❌') + '</td><td>' + e(u.role) + '</td><td>' + e(u.realName) + '</td><td><span class="status ' + (u.enabled ? 'published' : 'ended') + '">' + (u.enabled ? '正常' : '已禁用') + '</span></td><td><button onclick="toggleUser(' + u.id + ')" style="padding:4px 12px;border-radius:8px;border:1px solid #ddd;cursor:pointer;font-size:12px;background:#fff">' + (u.enabled ? '禁用' : '启用') + '</button></td><td>' + e(u.createdAt) + '</td></tr>';
    });
    document.getElementById('usersBody').innerHTML = html || '<tr><td colspan="9" style="text-align:center;color:#999">暂无数据</td></tr>';
    renderPages(d.pages, loadUsers);
  });
}

function loadActivities() {
  api('/admin/activities').then(d => {
    var html = '';
    (d.activities||[]).forEach(a => {
      html += '<tr><td>' + a.id + '</td><td>' + e(a.name) + '</td><td>' + e(a.ownerName) + '</td><td><span class="status ' + a.status + '">' + statusLabel(a.status) + '</span></td><td>' + a.submissionCount + '</td><td><button onclick="deleteActivity(\'' + a.id + '\',\'' + e(a.name).replace(/'/g,'') + '\')" style="padding:4px 12px;border-radius:8px;border:1px solid #D32F2F;color:#D32F2F;cursor:pointer;font-size:12px;background:#fff">删除</button></td><td>' + e(a.createdAt) + '</td></tr>';
    });
    document.getElementById('activitiesBody').innerHTML = html || '<tr><td colspan="7" style="text-align:center;color:#999">暂无数据</td></tr>';
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === (tab==='users'?0:1)));
  document.getElementById('usersTab').style.display = tab==='users'?'block':'none';
  document.getElementById('activitiesTab').style.display = tab==='activities'?'block':'none';
  if (tab === 'activities') loadActivities();
  else loadUsers(1);
}

function renderPages(total, fn) {
  var html = '';
  for (var i = 1; i <= total; i++) {
    html += '<button class="' + (i===currentPage?'active':'') + '" onclick="showPage('+i+')">' + i + '</button>';
  }
  document.getElementById('userPages').innerHTML = html;
}
function showPage(p) { currentPage = p; loadUsers(p); }
function statusLabel(s) { return {published:'已发布',draft:'草稿',ended:'已截止'}[s] || s; }
function e(s) { return s ? s.replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
</script>
</body>
</html>
